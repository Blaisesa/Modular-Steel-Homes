<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIR Configurator 3D</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <div class="app-container">

        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Configurator</h2>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item active">Styles</div>
                <div class="nav-item">Item 2</div>
                <div class="nav-item">Item 3</div>
                <div class="nav-item">Item 4</div>
            </nav>
        </aside>

        <main id="builder-viewport">
        </main>

        <div class="view-controls">
            <button id="roam-toggle" onclick="toggleFreeRoam()" title="Toggle Free Rotation">🔒</button>
            <div class="control-divider"></div>

            <button onclick="rotateTo('iso')">3D</button>
            <div class="control-divider"></div>
            <button onclick="rotateTo('top')">Top</button>
            <button onclick="rotateTo('front')">Front</button>
            <button onclick="rotateTo('back')">Back</button>
            <button onclick="rotateTo('left')">Left</button>
            <button onclick="rotateTo('right')">Right</button>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
