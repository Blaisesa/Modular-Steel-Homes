<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIR Configurator 3D</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <div class="app-container">
        <button id="menu-toggle" onclick="toggleSidebar()">
            <div class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>

        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Configurator</h2>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section active">
                    <div class="nav-header" onclick="toggleSection(this)">
                        <span>Styles</span>
                        <span class="chevron">▼</span>
                    </div>
                    <div class="nav-content">
                        <div class="style-option active" onclick="setShape('rectangle')">
                            <div class="style-icon">█</div>
                            <span>Rectangle</span>
                        </div>
                        <div class="style-option" onclick="setShape('l-shape')">
                            <div class="style-icon">┗</div>
                            <span>L-Shape</span>
                        </div>
                    </div>
                </div>

                <div class="nav-section">
                    <div class="nav-header" onclick="toggleSection(this)">
                        <span>Roof Style</span>
                        <span class="chevron">▼</span>
                    </div>
                    <div class="nav-content" id="roof-options">
                        <div class="style-option active" onclick="setRoof('pent')">
                            <span>Pent (Sloped)</span>
                        </div>
                        <div class="style-option" onclick="setRoof('apex')">
                            <span>Apex (Pointed)</span>
                        </div>
                    </div>
                </div>

                <div class="nav-section">
                    <div class="nav-header" onclick="toggleSection(this)">
                        <span>Dimensions</span>
                        <span class="chevron">▼</span>
                    </div>
                    <div class="nav-content">
                        <div class="control-group">
                            <label>Width: <span id="val-w">6</span>m</label>
                            <input type="range" min="3" max="12" step="0.5" value="6"
                                oninput="updateDim('W', this.value)">
                        </div>
                        <div class="control-group">
                            <label>Depth: <span id="val-d">4</span>m</label>
                            <input type="range" min="3" max="10" step="0.5" value="4"
                                oninput="updateDim('D', this.value)">
                        </div>
                    </div>
                </div>
            </nav>
        </aside>

        <main id="builder-viewport"></main>

        <div class="view-controls">
            <button id="roam-toggle" onclick="toggleFreeRoam()" title="Toggle Lock">🔒</button>
            <button id="roof-toggle" onclick="toggleRoof()" title="Toggle Roof Visibility">🏠</button>
            <div class="control-divider"></div>
            <button onclick="rotateTo('iso')">3D</button>
            <div class="control-divider"></div>
            <button onclick="rotateTo('top')">Top</button>
            <button onclick="rotateTo('front')">Front</button>
            <button onclick="rotateTo('back')">Back</button>
            <button onclick="rotateTo('left')">Left</button>
            <button onclick="rotateTo('right')">Right</button>
        </div>

        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    </div>

    <div class="zoom-slider-container">
        <input type="range" id="zoom-slider" min="5" max="25" step="0.1" value="12"
            oninput="handleZoomSlider(this.value)">
        <span class="zoom-label">Zoom</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
